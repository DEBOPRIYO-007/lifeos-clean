<!DOCTYPE html>
<html>
<head>
  <title>LifeOS</title>
  <style>
    body {
      background: #0a0f1c;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }
    .chat {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>LifeOS</h1>
<p>Control your digital world</p>

<input id="input" placeholder="Type command..." />
<button onclick="send()">Send</button>

<div class="chat" id="chat"></div>

<script>
function send() {
  const inputBox = document.getElementById("input");
  const input = inputBox.value.toLowerCase();
  const chat = document.getElementById("chat");

  let response = "";

  if (input.includes("study")) {
    response = "📘 Study Mode Activated → Notifications OFF, Focus ON";
    document.body.style.background = "#050a14";
  } 
  else if (input.includes("tired") || input.includes("rest")) {
    response = "😴 Rest Mode Activated → Relax, breathe";
    document.body.style.background = "#1a0f0f";
  } 
  else if (input.includes("focus")) {
    response = "⚡ Deep Focus Mode → Distractions eliminated";
    document.body.style.background = "#000000";
  } 
  else if (input.includes("hello")) {
    response = "👋 Hello. LifeOS is active.";
  } 
  else {
    response = "⚠️ Command not recognized";
  }

  chat.innerHTML += "<p>" + response + "</p>";
  inputBox.value = "";
}
</script>

</body>
</html>
