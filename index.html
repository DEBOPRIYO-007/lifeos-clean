<!DOCTYPE html>
<html>
<head>
  <title>LifeOS</title>
  <style>
    body {
  margin: 0;
  background: #0a0f1c;
  color: #00d4ff;
  font-family: "Courier New", monospace;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 15px;
  border-bottom: 1px solid #00d4ff33;
}

.logo {
  font-weight: bold;
}

/* CONSOLE */
.console {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.console p {
  margin: 5px 0;
  background: rgba(0,212,255,0.05);
  padding: 8px;
  border-radius: 8px;
  text-shadow: 0 0 5px #00d4ff88;
}

/* INPUT BAR */
.input-bar {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-top: 1px solid #00d4ff33;
}

input {
  flex: 1;
  padding: 10px;
  background: black;
  border: none;
  color: #00d4ff;
  outline: none;
}

button {
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #00d4ff22;
  color: #00d4ff;
  cursor: pointer;
}

button:hover {
  background: #00d4ff44;
}
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">LifeOS</div>
    <div id="status">⚡ SYSTEM IDLE</div>
  </header>

  <!-- CONSOLE -->
  <main class="console" id="chat"></main>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <input id="input" placeholder="Enter command..." />
    <button onclick="send()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>

</div>

<script>
window.onload = function() {

  function send() {
    const inputBox = document.getElementById("input");
    const inputRaw = inputBox.value.trim();
    if (!inputRaw) return;

    const input = inputRaw.toLowerCase();
    const chat = document.getElementById("chat");
    const status = document.getElementById("status");

    let response = "";

    chat.innerHTML += `<p>> ${inputRaw}</p>`;
    chat.scrollTop = chat.scrollHeight;

    status.innerText = "⏳ PROCESSING...";

    setTimeout(() => {

      if (input.includes("study") || input.includes("exam") || input.includes("learn")) {
        response = "📘 Study Mode Activated";
        status.innerText = "⚡ STUDY MODE ACTIVE";
        document.body.style.background = "#050a14";
      } 
      else if (input.includes("tired") || input.includes("sleep") || input.includes("rest")) {
        response = "😴 Rest Mode Activated";
        status.innerText = "💤 REST MODE ACTIVE";
        document.body.style.background = "#1a0f0f";
      } 
      else if (input.includes("focus") || input.includes("deep work")) {
        response = "⚡ Focus Mode Activated";
        status.innerText = "🔥 FOCUS MODE ACTIVE";
        document.body.style.background = "#000000";
      } 
      else if (input.includes("hello") || input.includes("hi")) {
        response = "👋 Hello. LifeOS is online.";
        status.innerText = "🟢 SYSTEM ONLINE";
      } 
      else {
        response = "🤖 Understanding... but command not mapped yet.";
        status.innerText = "⚠️ LEARNING MODE";
      }

      chat.innerHTML += `<p>${response}</p>`;
      chat.scrollTop = chat.scrollHeight;

    }, 300);

    inputBox.value = "";
    inputBox.focus();
  }

  // ENTER KEY FIX
  document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      send();
    }
  });

  // BUTTON CLICK FIX (important)
  window.send = send;

  // VOICE
  window.startVoice = function() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("Voice not supported in this browser");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event) {
      const voiceText = event.results[0][0].transcript;
      document.getElementById("input").value = voiceText;
      send();
    };

    recognition.onerror = function() {
      alert("Voice error or permission denied");
    };
  };

  // BOOT MESSAGE
  const chat = document.getElementById("chat");
  chat.innerHTML += `<p>⚡ LifeOS Initialized</p>`;
  chat.innerHTML += `<p>Type a command to begin...</p>`;

};
</script>

window.onload = function() {
  const chat = document.getElementById("chat");
  chat.innerHTML += `<p>⚡ LifeOS Initialized</p>`;
  chat.innerHTML += `<p>Type a command to begin...</p>`;
};

</body>
</html>
